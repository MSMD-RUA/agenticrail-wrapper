name = "agenticrail-wrapper"
main = "src/index.ts"
compatibility_date = "2026-04-17"

[vars]
DEMO_KEY = "DEMO-AGENTICRAIL-PUBLIC-2026"

[[services]]
binding = "RAIL"
service = "slp8-gate"
environment = "production"

[[d1_databases]]
binding = "DB"
database_name = "agenticrail_wrapper_db"
database_id = "244d3faa-dee5-4089-b951-82299e98811b"

[durable_objects]
bindings = [{ name = "RATE_LIMITER", class_name = "RateLimiter" }]

[[migrations]]
tag = "v1"
new_classes = ["RateLimiter"]